services:
  flask-backend:
    build: ./backend-flask
    container_name: flask-clustering-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
    volumes:
      - ./data:/data
    networks:
      - app-network

  springboot-backend:
    build:
      context: .
      dockerfile: Dockerfile.combined
    container_name: springboot-api
    ports:
      - "8080:8080"
    environment:
      - BENCHMARK_DATA_DIRECTORY=/data
    volumes:
      - ./data:/data
      - ./gurobi.lic:/app/gurobi.lic:ro
    networks:
      - app-network

networks:
  app-network:
    driver: bridge