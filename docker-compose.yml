version: '3.8'

services:
  flask-backend:
    build: ./backend-flask
    container_name: flask-clustering-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
    volumes:
      - ./data:/app/data
    networks:
      - app-network

  springboot-backend:
    build: ./backend-springboot
    container_name: springboot-api
    ports:
      - "8080:8080"
    environment:
      - BENCHMARK_DATA_DIRECTORY=/data
    volumes:
      - ./data:/data
    networks:
      - app-network

  alignment-server:
    build: ./backend-alignment
    container_name: alignment-api
    ports:
      - "5001:5001"
    environment:
      - WLSACCESSID=${GUROBI_WLSACCESSID}
      - WLSSECRET=${GUROBI_WLSSECRET}
      - LICENSEID=${GUROBI_LICENSEID}
    volumes:
      - ./data:/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge